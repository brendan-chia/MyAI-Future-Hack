steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/safelah', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/safelah']
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args: ['run', '--filename=.', '--image=gcr.io/$PROJECT_ID/safelah', '--location=asia-southeast1']

images:
  - 'gcr.io/$PROJECT_ID/safelah'
