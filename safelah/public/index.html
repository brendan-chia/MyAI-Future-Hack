<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SelamatLah — Semak Mesej Mencurigakan</title>
  <meta name="description" content="SelamatLah membantu anda semak mesej penipuan. Taip /register atau /login untuk mula, atau hantar mesej mencurigakan terus.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">🛡️</span>
          <div class="logo-text">
            <h1>SelamatLah</h1>
            <span class="tagline">Scam Detection Assistant</span>
          </div>
        </div>
      </div>
      <div class="header-right">
        <div class="status-dot"></div>
        <span class="status-text">Online</span>
        <div class="user-badge" id="userBadge" title="Maklumat akaun" style="display:none">
          <span class="user-badge-icon" id="userBadgeIcon">👤</span>
          <span class="user-badge-name" id="userBadgeName">...</span>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Log keluar" style="display:none">⏻</button>
      </div>
    </header>

    <!-- Chat area -->
    <main class="chat-area" id="chatArea">
      <div class="chat-date">
        <span>Hari ini</span>
      </div>
    </main>

    <!-- Image preview bar -->
    <div class="image-preview-bar" id="imagePreviewBar" style="display:none;">
      <div class="image-preview-inner">
        <img id="imagePreviewImg" src="" alt="Preview">
        <button class="image-remove-btn" id="imageRemoveBtn" title="Remove image">✕</button>
      </div>
      <span class="image-preview-label">Screenshot attached</span>
    </div>

    <!-- Input area -->
    <footer class="input-area">
      <div class="input-container">
        <label class="attach-btn" id="attachBtn" title="Attach screenshot or audio">
          <input type="file" accept="image/*,audio/*,.ogg,.mp3,.mp4,.m4a,.wav" id="imageInput" hidden>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </label>
        <textarea
          id="messageInput"
          placeholder="Taip /start untuk mod kelompok, atau paste mesej mencurigakan..."
          rows="1"
          autofocus
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Hantar" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Taip /start untuk analisis kelompok • /register atau /login • Atau seret &amp; lepas screenshot</p>
    </footer>
  </div>

  <!-- Password input overlay (shown during password steps) -->
  <div class="pwd-overlay" id="pwdOverlay" style="display:none;">
    <div class="pwd-container">
      <input type="password" id="pwdInput" placeholder="Kata laluan..." autocomplete="off">
      <button class="send-btn" id="pwdSendBtn" title="Hantar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">🔒 Input ini tersembunyi — kata laluan anda tidak kelihatan</p>
  </div>

  <!-- Drop zone overlay -->
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-content">
      <div class="drop-icon">📷</div>
      <p>Lepaskan screenshot di sini</p>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
