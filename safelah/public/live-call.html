<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeLah — Live Call Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg-base:       #070b12;
        --bg-1:          #0b1018;
        --bg-2:          #0f1720;
        --bg-3:          #162030;
        --bg-4:          #1c2a3e;
        --bg-5:          #223348;

        --border:        rgba(99,155,210,0.08);
        --border-strong: rgba(99,155,210,0.15);
        --border-accent: rgba(14,165,233,0.3);

        --sky:          #0ea5e9;
        --sky-bright:   #38bdf8;
        --sky-dim:      rgba(14,165,233,0.12);
        --sky-glow:     rgba(14,165,233,0.2);
        --sky-text:     #7dd3fc;

        --cyan:         #22d3ee;
        --cyan-dim:     rgba(34,211,238,0.1);

        --emerald:       #10b981;
        --emerald-dim:   rgba(16,185,129,0.1);
        --emerald-text:  #6ee7b7;

        --amber:         #f59e0b;
        --amber-dim:     rgba(245,158,11,0.12);
        --amber-text:    #fcd34d;

        --crimson:       #ef4444;
        --crimson-dim:   rgba(239,68,68,0.1);
        --crimson-text:  #fca5a5;

        --warning:       #f59e0b;
        --warning-dim:   rgba(245,158,11,0.12);
        --warning-text:  #fcd34d;

        --text-1:        #e8f0fb;
        --text-2:        #7a96b8;
        --text-3:        #3d5472;

        --font-display:  'Bricolage Grotesque', sans-serif;
        --font-body:     'DM Sans', sans-serif;
        --font-mono:     'IBM Plex Mono', monospace;

        --r-xs:   4px;
        --r-sm:   6px;
        --r-md:   10px;
        --r-lg:   16px;
        --r-xl:   20px;
        --r-full: 9999px;
      }

      html, body {
        width: 100%; height: 100%;
        font-family: var(--font-body);
        background: var(--bg-base);
        color: var(--text-1);
        -webkit-font-smoothing: antialiased;
      }

      /* Fine dot-grid background */
      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image: radial-gradient(circle, rgba(14,165,233,0.055) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      body::after {
        content: '';
        position: fixed;
        top: -100px; left: 50%; transform: translateX(-50%);
        width: 480px; height: 380px;
        background: radial-gradient(ellipse, rgba(14,165,233,0.055) 0%, transparent 70%);
        pointer-events: none; z-index: 0;
      }

      /* ── Animations ── */
      @keyframes shield-breathe {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(14,165,233,0.4)); }
        50%       { filter: drop-shadow(0 0 14px rgba(14,165,233,0.85)); }
      }
      @keyframes status-pulse {
        0%, 100% { box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
        50%       { box-shadow: 0 0 0 6px rgba(16,185,129,0.06); }
      }
      @keyframes pulse-ring {
        0%   { transform: scale(0.85); opacity: 0.85; }
        70%  { transform: scale(1.5);  opacity: 0; }
        100% { transform: scale(1.5);  opacity: 0; }
      }
      @keyframes mic-glow {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(14,165,233,0.4)); transform: scale(1); }
        50%       { filter: drop-shadow(0 0 18px rgba(14,165,233,0.9)); transform: scale(1.08); }
      }
      @keyframes dot-blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.2; }
      }
      @keyframes slide-up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes scan-line {
        0%   { transform: translateY(0); opacity: 0.5; }
        100% { transform: translateY(100%); opacity: 0; }
      }

      /* ── App shell ── */
      .app {
        position: relative; z-index: 1;
        max-width: 440px;
        margin: 0 auto;
        height: 100vh; height: 100dvh;
        display: flex; flex-direction: column;
        background: var(--bg-1);
        box-shadow: 0 0 0 1px var(--border), 0 0 100px rgba(0,0,0,0.7);
        overflow: hidden;
      }

      /* ── Header ── */
      .header {
        position: relative;
        background: var(--bg-2);
        border-bottom: 1px solid var(--border);
        padding: 12px 16px;
        flex-shrink: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .header::before {
        content: '';
        position: absolute; inset: 0; pointer-events: none;
        background-image:
          linear-gradient(90deg, var(--border) 1px, transparent 1px),
          linear-gradient(0deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.5;
      }

      .header::after {
        content: '';
        position: absolute; top: 0; left: 0; right: 0;
        height: 1.5px;
        background: linear-gradient(90deg, transparent 0%, var(--sky) 25%, var(--cyan) 60%, transparent 100%);
      }

      .logo {
        display: flex; align-items: center; gap: 10px;
        position: relative; z-index: 1;
      }

      .logo-icon-wrap {
        position: relative;
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: var(--sky-dim);
        border: 1px solid var(--border-accent);
        border-radius: var(--r-md);
      }

      .logo-icon-wrap::before {
        content: '';
        position: absolute; inset: -5px;
        border-radius: 14px;
        background: var(--sky-glow);
        filter: blur(8px);
        opacity: 0.5;
      }

      .logo-icon-wrap .shield-svg {
        position: relative; z-index: 1;
        animation: shield-breathe 4s ease-in-out infinite;
      }

      .logo-text h1 {
        font-family: var(--font-display);
        font-size: 18px; font-weight: 800;
        color: var(--text-1);
        letter-spacing: -0.03em; line-height: 1;
      }

      .logo-text h1 span { color: var(--sky-bright); }

      .tagline {
        font-size: 9.5px; font-weight: 500;
        color: var(--text-3);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        display: block; margin-top: 2px;
        font-family: var(--font-mono);
      }

      /* Live indicator badge in header */
      .header-live {
        position: relative; z-index: 1;
        display: flex; align-items: center; gap: 6px;
        background: var(--bg-3);
        border: 1px solid var(--border-strong);
        border-radius: var(--r-full);
        padding: 5px 12px;
        font-size: 10px; font-weight: 700;
        color: var(--text-3);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: var(--font-mono);
        transition: all 0.3s;
      }

      .header-live.active {
        border-color: rgba(239,68,68,0.4);
        color: var(--crimson-text);
        background: var(--crimson-dim);
      }

      .header-live.active .live-dot {
        background: var(--crimson);
        box-shadow: 0 0 0 2px rgba(239,68,68,0.3);
        animation: dot-blink 1s ease-in-out infinite;
      }

      .live-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--text-3);
        transition: all 0.3s;
      }

      /* ── Connection status ── */
      #connectionStatus {
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center; gap: 7px;
        padding: 6px 14px;
        font-size: 10.5px; font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-family: var(--font-mono);
        border-bottom: 1px solid var(--border);
        transition: all 0.3s;
      }

      #connectionStatus::before {
        content: ''; width: 5px; height: 5px;
        border-radius: 50%; flex-shrink: 0;
      }

      #connectionStatus.connected {
        background: rgba(16,185,129,0.06);
        color: var(--emerald-text);
      }
      #connectionStatus.connected::before {
        background: var(--emerald);
        box-shadow: 0 0 0 2px rgba(16,185,129,0.2);
        animation: status-pulse 2.5s ease-in-out infinite;
      }
      #connectionStatus.connecting {
        background: var(--warning-dim);
        color: var(--warning-text);
      }
      #connectionStatus.connecting::before {
        background: var(--warning);
        animation: dot-blink 1s ease-in-out infinite;
      }
      #connectionStatus.error {
        background: var(--crimson-dim);
        color: var(--crimson-text);
      }
      #connectionStatus.error::before { background: var(--crimson); }

      /* ── Instruction banner ── */
      #instructionBanner {
        display: none;
        flex-shrink: 0;
        padding: 9px 16px;
        background: var(--sky-dim);
        border-bottom: 1px solid rgba(14,165,233,0.15);
        color: var(--sky-text);
        font-size: 11.5px; font-weight: 500;
        text-align: center; line-height: 1.5;
        animation: fade-in 0.3s ease;
      }

      /* ── Content ── */
      .content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 14px 14px 20px;
        display: flex; flex-direction: column;
        gap: 10px;
      }

      .content::-webkit-scrollbar { width: 3px; }
      .content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }

      /* ── Status pill ── */
      .status-row {
        display: flex; justify-content: center;
        padding-top: 2px;
      }

      #statusPill {
        display: inline-flex; align-items: center; gap: 7px;
        padding: 6px 20px;
        background: var(--bg-3);
        border: 1px solid var(--border-strong);
        border-radius: var(--r-full);
        font-size: 11px; font-weight: 700;
        color: var(--text-3);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: var(--font-mono);
        transition: all 0.3s;
      }

      #statusPill.active {
        background: var(--sky-dim);
        border-color: var(--border-accent);
        color: var(--sky-text);
        box-shadow: 0 0 18px rgba(14,165,233,0.08);
      }

      #statusPill.danger {
        background: var(--crimson-dim);
        border-color: rgba(239,68,68,0.35);
        color: var(--crimson-text);
      }

      /* ── Mic indicator ── */
      #microphoneIndicator {
        display: none;
        flex-direction: column; align-items: center; gap: 10px;
        padding: 8px 0;
        animation: fade-in 0.4s ease;
      }

      .mic-stage {
        position: relative;
        width: 76px; height: 76px;
        display: flex; align-items: center; justify-content: center;
      }

      .mic-ring {
        position: absolute; inset: 0;
        border-radius: 50%;
        border: 1.5px solid var(--sky);
        opacity: 0;
        animation: pulse-ring 2.2s cubic-bezier(0.215,0.61,0.355,1) infinite;
      }

      .mic-ring:nth-child(2) {
        animation-delay: 0.7s;
        border-color: rgba(14,165,233,0.5);
      }

      .mic-ring:nth-child(3) {
        animation-delay: 1.4s;
        border-color: rgba(14,165,233,0.3);
      }

      .mic-core {
        position: relative; z-index: 1;
        width: 54px; height: 54px;
        border-radius: 50%;
        background: var(--bg-3);
        border: 1px solid var(--border-accent);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 24px rgba(14,165,233,0.1), inset 0 1px 0 rgba(255,255,255,0.04);
      }

      .mic-icon-svg {
        animation: mic-glow 1.8s ease-in-out infinite;
      }

      .mic-label {
        font-size: 10px; font-weight: 700;
        color: var(--sky);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-family: var(--font-mono);
      }

      /* ── Buttons ── */
      .button-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .btn {
        display: flex; align-items: center; justify-content: center; gap: 7px;
        min-height: 48px; padding: 10px 14px;
        border: none; border-radius: var(--r-md);
        font-family: var(--font-body);
        font-size: 13px; font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: -0.01em;
        -webkit-appearance: none;
      }

      .btn:active { transform: scale(0.97); }

      #startBtn {
        background: var(--sky);
        color: #001f35;
        box-shadow: 0 2px 14px rgba(14,165,233,0.3);
        grid-column: 1 / -1;
      }
      #startBtn:hover:not(:disabled) {
        background: var(--sky-bright);
        box-shadow: 0 4px 22px rgba(14,165,233,0.45);
        transform: translateY(-1px);
      }
      #startBtn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

      #stopBtn {
        display: none;
        background: var(--crimson);
        color: white;
        box-shadow: 0 2px 12px rgba(239,68,68,0.25);
      }
      #stopBtn:hover:not(:disabled) {
        background: #dc2626;
        box-shadow: 0 4px 20px rgba(239,68,68,0.4);
        transform: translateY(-1px);
      }

      /* ── Panel label ── */
      .panel-label {
        font-size: 9.5px; font-weight: 700;
        color: var(--text-3);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 7px;
        font-family: var(--font-mono);
        display: flex; align-items: center; gap: 6px;
      }

      .panel-label::before {
        content: '';
        display: block; width: 3px; height: 3px;
        border-radius: 50%;
        background: var(--sky);
        opacity: 0.7;
      }

      /* ── System feedback ── */
      #systemFeedback {
        background: var(--bg-3);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        padding: 10px 13px;
        font-size: 12.5px; font-weight: 400;
        color: var(--text-2);
        line-height: 1.6;
        font-family: var(--font-mono);
        position: relative; overflow: hidden;
      }

      /* ── Risk badge ── */
      #riskBadge {
        display: none;
        padding: 11px 14px;
        border-radius: var(--r-md);
        text-align: center;
        font-size: 12.5px; font-weight: 800;
        font-family: var(--font-display);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        animation: slide-up 0.35s ease;
      }

      #riskBadge.low {
        background: var(--emerald-dim);
        border: 1px solid rgba(16,185,129,0.22);
        color: var(--emerald-text);
      }
      #riskBadge.medium {
        background: var(--warning-dim);
        border: 1px solid rgba(245,158,11,0.28);
        color: var(--warning-text);
      }
      #riskBadge.high {
        background: var(--crimson-dim);
        border: 1px solid rgba(239,68,68,0.28);
        color: var(--crimson-text);
        box-shadow: 0 0 22px rgba(239,68,68,0.1);
      }

      /* ── Transcript panel ── */
      #transcriptPanel {
        display: none;
        background: var(--bg-base);
        border: 1px solid var(--border-strong);
        border-radius: var(--r-md);
        padding: 12px;
        max-height: 180px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        font-family: var(--font-mono);
        font-size: 11.5px;
        line-height: 1.75;
        animation: slide-up 0.3s ease;
        position: relative;
      }

      /* scanline effect */
      #transcriptPanel::before {
        content: '';
        position: absolute; inset: 0; pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(14,165,233,0.015) 2px,
          rgba(14,165,233,0.015) 4px
        );
        border-radius: var(--r-md);
      }

      #transcriptPanel::-webkit-scrollbar { width: 3px; }
      #transcriptPanel::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }

      #transcriptPanel div {
        color: var(--text-2);
        margin-bottom: 2px;
        word-break: break-word;
      }

      #transcriptPanel div:last-child {
        color: var(--sky-text);
        font-weight: 500;
      }

      /* ── Advice panel ── */
      #advicePanel {
        display: none;
        padding: 13px 14px;
        border-radius: var(--r-md);
        font-size: 13px; line-height: 1.65;
        animation: slide-up 0.3s ease;
      }

      #advicePanel strong {
        display: block; margin-bottom: 7px;
        font-size: 9.5px; font-weight: 700;
        letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--text-3);
        font-family: var(--font-mono);
      }

      /* ── Guardian section ── */
      #guardianSection {
        background: var(--bg-2);
        border: 1px solid var(--border-strong);
        border-radius: var(--r-lg);
        padding: 14px;
        margin-top: auto;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }

      /* Left accent bar */
      #guardianSection::before {
        content: '';
        position: absolute; top: 0; left: 0; bottom: 0;
        width: 2px;
        background: linear-gradient(180deg, var(--sky) 0%, var(--cyan) 100%);
        border-radius: 2px 0 0 2px;
      }

      /* Corner decoration */
      #guardianSection::after {
        content: '';
        position: absolute; top: 0; right: 0;
        width: 60px; height: 60px;
        background: radial-gradient(circle at top right, rgba(14,165,233,0.06) 0%, transparent 70%);
        pointer-events: none;
      }

      .guardian-label {
        font-size: 9.5px; font-weight: 700;
        color: var(--text-3);
        letter-spacing: 0.12em; text-transform: uppercase;
        margin-bottom: 8px; padding-left: 6px;
        display: flex; align-items: center; gap: 6px;
        font-family: var(--font-mono);
      }

      .guardian-label svg { color: var(--sky); opacity: 0.7; }

      #guardianPhoneDisplay {
        display: block;
        font-family: var(--font-mono);
        font-size: 15px; font-weight: 600;
        color: var(--text-1);
        margin-bottom: 12px;
        padding-left: 6px;
        word-break: break-all;
        letter-spacing: 0.04em;
      }

      .guardian-buttons {
        display: flex; flex-direction: column; gap: 7px;
      }

      #callGuardianBtn {
        display: none;
        padding: 12px 14px;
        background: var(--sky);
        color: #001f35;
        border: none; border-radius: var(--r-md);
        font-family: var(--font-body);
        font-size: 13px; font-weight: 800;
        text-decoration: none; text-align: center;
        cursor: pointer; transition: all 0.2s;
        letter-spacing: -0.01em;
        box-shadow: 0 2px 16px rgba(14,165,233,0.28);
        display: flex; align-items: center; justify-content: center; gap: 7px;
      }

      #callGuardianBtn:hover {
        background: var(--sky-bright);
        box-shadow: 0 4px 24px rgba(14,165,233,0.4);
        transform: translateY(-1px);
      }

      #setGuardianBtn {
        padding: 10px 12px;
        background: transparent;
        border: 1px solid var(--border-strong);
        border-radius: var(--r-md);
        font-family: var(--font-body);
        font-size: 12.5px; font-weight: 600;
        color: var(--text-2);
        cursor: pointer; transition: all 0.2s;
        display: flex; align-items: center; justify-content: center; gap: 6px;
      }

      #setGuardianBtn:hover {
        border-color: var(--border-accent);
        color: var(--sky-text);
        background: var(--sky-dim);
      }

      .guardian-divider {
        height: 1px;
        background: var(--border);
        margin: 1px 0;
      }

      #emergencyCallBtn {
        padding: 11px 14px;
        background: var(--crimson-dim);
        border: 1px solid rgba(239,68,68,0.22);
        border-radius: var(--r-md);
        font-family: var(--font-body);
        font-size: 13px; font-weight: 700;
        color: var(--crimson-text);
        cursor: pointer; transition: all 0.2s;
        letter-spacing: -0.01em;
        display: flex; align-items: center; justify-content: center; gap: 7px;
      }

      #emergencyCallBtn:hover {
        background: rgba(239,68,68,0.18);
        border-color: rgba(239,68,68,0.38);
        box-shadow: 0 0 18px rgba(239,68,68,0.1);
      }

      /* ── Responsive / iOS ── */
      @media (max-width: 375px) {
        .app { max-width: 100%; box-shadow: none; }
        .logo-text h1 { font-size: 16px; }
        .btn { font-size: 12px; min-height: 44px; }
      }

      @supports (-webkit-touch-callout: none) {
        body { padding-bottom: env(safe-area-inset-bottom); }
        .app { height: 100dvh; }
      }
    </style>
  </head>
  <body>
    <div class="app">

      <!-- Header -->
      <header class="header">
        <div class="logo">
          <div class="logo-icon-wrap">
            <svg class="shield-svg" width="20" height="22" viewBox="0 0 20 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 1L2 5V11C2 15.418 5.438 19.574 10 21C14.562 19.574 18 15.418 18 11V5L10 1Z" fill="rgba(14,165,233,0.15)" stroke="#0ea5e9" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M7 11L9.5 13.5L13.5 9" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="logo-text">
            <h1>Safe<span>Lah</span></h1>
            <span class="tagline">Live Call Companion</span>
          </div>
        </div>
        <div class="header-live" id="headerLive">
          <span class="live-dot"></span>
          Standby
        </div>
      </header>

      <!-- Connection status -->
      <div id="connectionStatus" class="connecting">Initializing…</div>

      <!-- Instruction banner -->
      <div id="instructionBanner"></div>

      <!-- Content -->
      <div class="content">

        <!-- Status pill -->
        <div class="status-row">
          <div id="statusPill">
            <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3.5" fill="none" stroke="currentColor" stroke-width="1"/></svg>
            Ready
          </div>
        </div>

        <!-- Mic indicator -->
        <div id="microphoneIndicator">
          <div class="mic-stage">
            <div class="mic-ring"></div>
            <div class="mic-ring"></div>
            <div class="mic-ring"></div>
            <div class="mic-core">
              <svg class="mic-icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </div>
          </div>
          <span class="mic-label">Listening</span>
        </div>

        <!-- Buttons — test button removed -->
        <div class="button-group">
          <button class="btn" id="startBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
            Start
          </button>
          <button class="btn" id="stopBtn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            Stop
          </button>
        </div>

        <!-- Risk badge -->
        <div id="riskBadge"></div>

        <!-- System status -->
        <div>
          <div class="panel-label">System Status</div>
          <div id="systemFeedback">Waiting to start…</div>
        </div>

        <!-- Live transcript -->
        <div>
          <div class="panel-label">Live Transcript</div>
          <div id="transcriptPanel"></div>
        </div>

        <!-- Advice -->
        <div id="advicePanel"></div>

        <!-- Guardian -->
        <div id="guardianSection">
          <div class="guardian-label">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            Guardian Contact
          </div>
          <span id="guardianPhoneDisplay"></span>
          <div class="guardian-buttons">
            <a id="callGuardianBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
              Call Guardian Now
            </a>
            <button id="setGuardianBtn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
              Set Guardian Number
            </button>
            <div class="guardian-divider"></div>
            <button id="emergencyCallBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              Emergency — Call 999
            </button>
          </div>
        </div>

      </div>
    </div>

    <script src="liveCall.js"></script>
  </body>
</html>
